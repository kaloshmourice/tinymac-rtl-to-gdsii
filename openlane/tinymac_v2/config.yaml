#============================================================
# TinyMAC v2 OpenLane Configuration
# Description:
#   OpenLane RTL-to-GDSII configuration for tinymac_top_v2.
#   TinyMAC v2 uses a pipelined datapath to improve timing potential.
#============================================================

# Basics
DESIGN_NAME: tinymac_top_v2

VERILOG_FILES:
  - dir::../../rtl_v2/mac_unit_v2.sv
  - dir::../../rtl_v2/adder_tree_v2.sv
  - dir::../../rtl_v2/control_fsm_v2.sv
  - dir::../../rtl_v2/tinymac_top_v2.sv

CLOCK_PERIOD: 10.5
CLOCK_PORT: clk

PNR_SDC_FILE: dir::src/impl.sdc
SIGNOFF_SDC_FILE: dir::src/signoff.sdc

# Pin Order
FP_PIN_ORDER_CFG: dir::pin_order.cfg

# PDN
FP_PDN_VOFFSET: 5
FP_PDN_HOFFSET: 5
FP_PDN_VWIDTH: 2
FP_PDN_HWIDTH: 2
FP_PDN_VPITCH: 30
FP_PDN_HPITCH: 30
FP_PDN_SKIPTRIM: true

# Technology-Specific Configs
pdk::sky130*:
  FP_CORE_UTIL: 35
  CLOCK_PERIOD: 10.5
  PL_TARGET_DENSITY: 0.45
  MAX_FANOUT_CONSTRAINT: 8
  GRT_ANTENNA_ITERS: 6
  GRT_ANTENNA_MARGIN: 20
